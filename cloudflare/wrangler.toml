# Shared Cloudflare Workers proxy
# Used by: AI Diary (ai_diary) / Voice Brain (voice_brain)
#
# Quick-start:
#   1. cd cloudflare
#   2. wrangler login
#   3. wrangler secret put OPENAI_API_KEY   # paste sk-proj-...
#   4. wrangler secret put GEMINI_API_KEY   # paste AIzaSy...
#   5. wrangler secret put APP_TOKEN        # any random 32+ char string
#   6. wrangler deploy
#
# Worker URL: https://ai-diary-proxy.<subdomain>.workers.dev
# AI Diary  → カスタム設定 → プロキシ設定 → プロキシURL に入力
# Voice Brain → proxyBaseUrl に同じ URL を設定

name            = "ai-diary-proxy"
main            = "worker.js"
compatibility_date = "2024-09-23"

# Free tier: 100,000 requests/day is more than enough for a personal diary app.
# The Worker runs in Cloudflare's global edge network — ~0 ms cold start.

# Secrets are NOT stored here — use `wrangler secret put`:
#   OPENAI_API_KEY
#   GEMINI_API_KEY
#   APP_TOKEN
