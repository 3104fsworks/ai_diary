name: ai_diary
description: "AI Diary - a minimal AI-powered life log diary."
publish_to: 'none'

version: 1.0.0+10

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: any
  go_router: ^14.6.1
  shared_preferences: ^2.3.3
  path_provider: ^2.1.5
  share_plus: ^10.1.2
  image_picker: ^1.1.2
  # record 5.x / 6.x pulled record_platform_interface 1.6.0 while record_linux
  # stayed at 0.7.2 (which only implements ≤1.5.0). That mismatch caused a
  # kernel_snapshot_program compile error even on Android builds because Flutter
  # compiles ALL platform Dart files into the kernel snapshot.
  # Fix: record 7.x uses record_platform_interface ^2.0.0, which is consistent
  # with record_linux 2.0.0 and record_android 2.0.0.
  record: ^7.0.0
  audioplayers: ^6.0.0
  purchases_flutter: ^8.0.0
  flutter_local_notifications: ^18.0.0
  timezone: ^0.9.4
  permission_handler: ^11.3.1
  http: ^1.2.2
  geolocator: ^13.0.2
  archive: ^3.6.1
  health: ^13.0.1
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.4
  crypto: ^3.0.6
  googleapis: ^14.0.0
  googleapis_auth: ^2.0.0
  flutter_svg: ^2.0.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.4
  image: ^4.3.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#FAFAF7"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false

flutter_native_splash:
  color: "#FAFAF7"
  color_dark: "#121212"
  image: "assets/icon/splash_logo.png"
  image_dark: "assets/icon/splash_logo_dark.png"
  android_12:
    image: "assets/icon/splash_logo.png"
    image_dark: "assets/icon/splash_logo_dark.png"
    color: "#FAFAF7"
    color_dark: "#121212"
  android: true
  ios: true
  web: false

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
